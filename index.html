<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUTOPRAK - Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }

  #top-bar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 16px 0;
    flex-shrink: 0;
  }

  h1 {
    color: #4bfc68;
    font-size: clamp(1rem, 3.5vw, 2rem);
    letter-spacing: 0.4em;
    text-shadow: 0 0 20px #4bfc68, 0 0 40px #00aa33;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.55; }
  }

  #canvas-wrap {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 8px;
    min-height: 0;
  }

  #canvas-wrap canvas {
    display: block;
    border: 1px solid #1e4d1e;
    box-shadow:
      0 0 0 1px #0d2a0d,
      0 0 30px #4bfc6833,
      0 0 60px #00ff4118 inset;
  }

  #bottom-bar {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 16px 10px;
    flex-shrink: 0;
  }

  #score-bar {
    display: flex;
    gap: clamp(16px, 4vw, 40px);
    color: #4bfc68;
    font-size: clamp(0.65rem, 1.8vw, 0.9rem);
    letter-spacing: 0.15em;
    text-shadow: 0 0 8px #4bfc68;
  }
  #score-bar span b { color: #fff; }

  #letters-bar {
    font-size: clamp(0.8rem, 2.5vw, 1.1rem);
    letter-spacing: clamp(0.2em, 1vw, 0.45em);
  }
</style>
</head>
<body>

<div id="top-bar">
  <h1>M·U·T·O·P·R·A·K</h1>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<div id="bottom-bar">
  <div id="score-bar">
    <span>SCORE: <b id="score">0</b></span>
    <span>LENGTH: <b id="length">3</b></span>
    <span>HIGH: <b id="high">0</b></span>
  </div>
  <div id="letters-bar">
    <span id="letters-display"></span>
  </div>
</div>

<script>
// ─── GRID (fixed logical size, CELL is computed) ──────────────────────────────
const COLS    = 25;
const ROWS    = 21;
const TICK_MS = 100;

let CELL = 20;
let W    = COLS * CELL;
let H    = ROWS * CELL;

// ─── PALETTE ─────────────────────────────────────────────────────────────────
const C_BG     = '#0d1f0d';
const C_GRID   = '#122012';
const C_HEAD   = '#6eff88';
const C_BODY_A = '#3cd458';
const C_BODY_B = '#2aaa44';
const C_DEAD   = '#ff4444';
const C_DEAD_B = '#882222';

const LETTERS     = ['M','U','T','O','P','R','A','K'];
const FOOD_COLORS = [
  '#FF4444','#44AAFF','#FF88AA','#FFB344',
  '#44FF88','#FF44FF','#44FFFF','#FFFFFF',
];

// ─── CANVAS ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function applySize() {
  const wrap   = document.getElementById('canvas-wrap');
  const availW = wrap.clientWidth  - 16;
  const availH = wrap.clientHeight - 16;
  CELL = Math.max(8, Math.floor(Math.min(availW / COLS, availH / ROWS)));
  W    = CELL * COLS;
  H    = CELL * ROWS;
  canvas.width  = W;
  canvas.height = H;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let snake          = [];
let dir            = { x: 1, y: 0 };
let foods          = [];
let score          = 0;
let high           = 0;
let collected      = [];
let dead           = false;
let deadFrames     = 0;
let celebrate      = false;
let celebrateFrames = 0;

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  const sx = Math.floor(COLS / 2);
  const sy = Math.floor(ROWS / 2);
  snake = [
    { x: sx,     y: sy },
    { x: sx - 1, y: sy },
    { x: sx - 2, y: sy },
  ];
  dir             = { x: 1, y: 0 };
  dead            = false;
  deadFrames      = 0;
  celebrate       = false;
  celebrateFrames = 0;
  collected       = [];
  score           = 0;
  document.getElementById('score').textContent  = 0;
  document.getElementById('length').textContent = snake.length;
  updateLettersDisplay();
  placeAllFoods();
}

// ─── FOOD ─────────────────────────────────────────────────────────────────────
function cellFree(x, y, excludeIdx = -1) {
  if (snake.some(s => s.x === x && s.y === y)) return false;
  if (foods.some((f, i) => i !== excludeIdx && f.x === x && f.y === y)) return false;
  return true;
}

function randomFreeCell(excludeIdx = -1) {
  for (let t = 0; t < 2000; t++) {
    const x = 1 + Math.floor(Math.random() * (COLS - 2));
    const y = 1 + Math.floor(Math.random() * (ROWS - 2));
    if (cellFree(x, y, excludeIdx)) return { x, y };
  }
  return { x: 1, y: 1 };
}

function placeAllFoods() {
  foods = LETTERS.map((letter, idx) => {
    const pos = randomFreeCell(idx);
    return { ...pos, letter, color: FOOD_COLORS[idx], idx, phase: Math.random() * Math.PI * 2 };
  });
}

function respawnFood(idx) {
  const pos = randomFreeCell(idx);
  foods[idx] = { ...pos, letter: LETTERS[idx], color: FOOD_COLORS[idx], idx, phase: Math.random() * Math.PI * 2 };
}

// ─── BFS PATHFINDING ─────────────────────────────────────────────────────────
const BFS_DIRS = [{ x:1,y:0 },{ x:-1,y:0 },{ x:0,y:1 },{ x:0,y:-1 }];

function buildOcc(excludeTail = true) {
  const occ = Array.from({ length: ROWS }, () => new Uint8Array(COLS));
  const end  = excludeTail ? snake.length - 1 : snake.length;
  for (let i = 0; i < end; i++) {
    const s = snake[i];
    if (s.y >= 0 && s.y < ROWS && s.x >= 0 && s.x < COLS) occ[s.y][s.x] = 1;
  }
  return occ;
}

function bfsNextStep(target) {
  const occ  = buildOcc(true);
  const head = snake[0];
  if (head.x === target.x && head.y === target.y) return null;

  const vis = Array.from({ length: ROWS }, () => new Uint8Array(COLS));
  vis[head.y][head.x] = 1;
  const queue = [];

  for (const d of BFS_DIRS) {
    const nx = head.x + d.x, ny = head.y + d.y;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
    if (occ[ny][nx] || vis[ny][nx]) continue;
    vis[ny][nx] = 1;
    if (nx === target.x && ny === target.y) return d;
    queue.push([nx, ny, d]);
  }

  let qi = 0;
  while (qi < queue.length) {
    const [cx, cy, first] = queue[qi++];
    for (const d of BFS_DIRS) {
      const nx = cx + d.x, ny = cy + d.y;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
      if (occ[ny][nx] || vis[ny][nx]) continue;
      vis[ny][nx] = 1;
      if (nx === target.x && ny === target.y) return first;
      queue.push([nx, ny, first]);
    }
  }
  return null;
}

function safeMoves() {
  const occ  = buildOcc(true);
  const head = snake[0];
  return BFS_DIRS.filter(d => {
    const nx = head.x + d.x, ny = head.y + d.y;
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return false;
    return !occ[ny][nx];
  });
}

function floodCount(sx, sy, occ) {
  if (occ[sy]?.[sx]) return 0;
  const vis = Array.from({ length: ROWS }, () => new Uint8Array(COLS));
  vis[sy][sx] = 1;
  const q = [[sx, sy]];
  let count = 0, qi = 0;
  while (qi < q.length) {
    const [cx, cy] = q[qi++];
    count++;
    for (const d of BFS_DIRS) {
      const nx = cx + d.x, ny = cy + d.y;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
      if (occ[ny][nx] || vis[ny][nx]) continue;
      vis[ny][nx] = 1;
      q.push([nx, ny]);
    }
  }
  return count;
}

// ─── AI ──────────────────────────────────────────────────────────────────────
function aiMove() {
  const head   = snake[0];
  const sorted = [...foods].sort((a, b) =>
    (Math.abs(a.x - head.x) + Math.abs(a.y - head.y)) -
    (Math.abs(b.x - head.x) + Math.abs(b.y - head.y))
  );

  for (const food of sorted) {
    const step = bfsNextStep(food);
    if (step) { dir = step; return; }
  }

  const moves = safeMoves();
  if (!moves.length) return;
  if (moves.length === 1) { dir = moves[0]; return; }

  const occ = buildOcc(true);
  let best = moves[0], bestSpace = -1;
  for (const d of moves) {
    const space = floodCount(head.x + d.x, head.y + d.y, occ);
    if (space > bestSpace) { bestSpace = space; best = d; }
  }
  dir = best;
}

// ─── GAME TICK ────────────────────────────────────────────────────────────────
function tick() {
  if (dead || celebrate) return;
  aiMove();

  const head = snake[0];
  const nx   = head.x + dir.x;
  const ny   = head.y + dir.y;

  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS)  { die(); return; }
  if (snake.some(s => s.x === nx && s.y === ny))      { die(); return; }

  snake.unshift({ x: nx, y: ny });

  const fi = foods.findIndex(f => f.x === nx && f.y === ny);
  if (fi !== -1) {
    score += 10 + Math.floor(snake.length / 5);
    if (score > high) { high = score; document.getElementById('high').textContent = high; }
    collected.push(foods[fi].letter);
    document.getElementById('score').textContent  = score;
    document.getElementById('length').textContent = snake.length;
    updateLettersDisplay();

    if (LETTERS.every(l => collected.includes(l))) {
      celebrate = true; celebrateFrames = 0; return;
    }
    respawnFood(fi);
  } else {
    snake.pop();
  }
  document.getElementById('length').textContent = snake.length;
}

function die() {
  dead = true; deadFrames = 0;
  if (score > high) { high = score; document.getElementById('high').textContent = high; }
}

// ─── LETTERS DISPLAY ─────────────────────────────────────────────────────────
function updateLettersDisplay() {
  const el = document.getElementById('letters-display');
  el.innerHTML = LETTERS.map((l, i) => {
    const got  = collected.includes(l);
    const col  = got ? FOOD_COLORS[i] : '#1e3d1e';
    const glow = got ? `0 0 10px ${FOOD_COLORS[i]}, 0 0 20px ${FOOD_COLORS[i]}66` : 'none';
    return `<span style="color:${col};text-shadow:${glow};transition:color .3s,text-shadow .3s">${l}</span>`;
  }).join('<span style="color:#1e3d1e">·</span>');
}

// ─── DRAWING ─────────────────────────────────────────────────────────────────
function drawGrid() {
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = C_GRID;
  ctx.lineWidth   = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(W, y * CELL); ctx.stroke();
  }
}

function drawFoods(now) {
  const fontSize = Math.max(9, Math.round(CELL * 0.62));
  foods.forEach(food => {
    const cx = food.x * CELL + CELL / 2;
    const cy = food.y * CELL + CELL / 2;
    const pulse = 0.82 + 0.18 * Math.sin(now / 350 + food.phase);
    const r = CELL * 0.38 * pulse;

    ctx.beginPath();
    ctx.arc(cx, cy, r + CELL * 0.2, 0, Math.PI * 2);
    ctx.fillStyle   = food.color + '15';
    ctx.shadowBlur  = 14;
    ctx.shadowColor = food.color;
    ctx.fill();

    ctx.shadowBlur   = 10;
    ctx.shadowColor  = food.color;
    ctx.font         = `bold ${fontSize}px 'Courier New', monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = food.color;
    ctx.fillText(food.letter, cx, cy + Math.round(fontSize * 0.07));
    ctx.shadowBlur = 0;
  });
}

function drawSnake(now) {
  const pad = Math.max(1, Math.round(CELL * 0.13));
  const rr  = Math.max(2, Math.round(CELL * 0.2));
  const es  = Math.max(1, Math.round(CELL * 0.14));

  snake.forEach((seg, i) => {
    const x = seg.x * CELL;
    const y = seg.y * CELL;

    let fill, glow;
    if (dead) {
      fill = i === 0 ? C_DEAD : C_DEAD_B;
      glow = C_DEAD;
    } else if (celebrate) {
      const hue = (now / 4 + i * 15) % 360;
      fill = `hsl(${hue},100%,55%)`;
      glow = fill;
    } else {
      fill = i === 0 ? C_HEAD : (i % 2 === 0 ? C_BODY_A : C_BODY_B);
      glow = i === 0 ? C_HEAD : C_BODY_A;
    }

    ctx.fillStyle   = fill;
    ctx.shadowBlur  = i === 0 ? Math.round(CELL * 0.9) : Math.round(CELL * 0.3);
    ctx.shadowColor = glow;
    ctx.beginPath();
    ctx.roundRect(x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, rr);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Eyes on head
    if (i === 0 && !dead) {
      ctx.fillStyle = C_BG;
      const fa = Math.round(CELL * 0.65); // forward offset
      const si = Math.round(CELL * 0.22); // side near
      const so = Math.round(CELL * 0.62); // side far
      const em = Math.round(CELL * 0.18); // eye inset from leading edge
      let ex1, ey1, ex2, ey2;
      if      (dir.x ===  1) { ex1=x+fa; ey1=y+si; ex2=x+fa;  ey2=y+so; }
      else if (dir.x === -1) { ex1=x+em; ey1=y+si; ex2=x+em;  ey2=y+so; }
      else if (dir.y ===  1) { ex1=x+si; ey1=y+fa; ex2=x+so;  ey2=y+fa; }
      else                   { ex1=x+si; ey1=y+em; ex2=x+so;  ey2=y+em; }
      ctx.fillRect(ex1, ey1, es, es);
      ctx.fillRect(ex2, ey2, es, es);
    }
  });
}

function drawOverlay(now) {
  const headSize = Math.round(Math.min(W, H) * 0.07);
  const subSize  = Math.round(headSize * 0.5);

  if (dead) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, W, H);

    ctx.font        = `bold ${headSize}px Courier New`;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle   = C_DEAD;
    ctx.shadowBlur  = headSize;
    ctx.shadowColor = C_DEAD;
    ctx.fillText('GAME OVER', W / 2, H / 2 - headSize * 0.7);

    ctx.font        = `${subSize}px Courier New`;
    ctx.fillStyle   = '#4bfc68';
    ctx.shadowColor = '#4bfc68';
    ctx.shadowBlur  = subSize;
    ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + subSize * 0.3);
    ctx.fillText('RESTARTING...', W / 2, H / 2 + subSize * 1.8);
    ctx.shadowBlur = 0;
  }

  if (celebrate) {
    const alpha = 0.45 + 0.45 * Math.sin(now / 80);
    ctx.strokeStyle = `rgba(255,255,100,${alpha})`;
    ctx.lineWidth   = Math.max(2, CELL * 0.15);
    ctx.strokeRect(1, 1, W - 2, H - 2);

    ctx.font        = `bold ${headSize}px Courier New`;
    ctx.textAlign   = 'center';
    ctx.textBaseline = 'middle';
    const hue = (now / 3) % 360;
    ctx.fillStyle   = `hsl(${hue},100%,65%)`;
    ctx.shadowBlur  = headSize;
    ctx.shadowColor = `hsl(${hue},100%,65%)`;
    ctx.fillText('MUTOPRAK!', W / 2, H / 2 - headSize * 0.7);

    ctx.font        = `${subSize}px Courier New`;
    ctx.fillStyle   = '#4bfc68';
    ctx.shadowColor = '#4bfc68';
    ctx.shadowBlur  = subSize;
    ctx.fillText('LETTERS COLLECTED!', W / 2, H / 2 + subSize * 0.3);
    ctx.shadowBlur = 0;
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let lastTick = 0;

function loop(now) {
  drawGrid();

  if (now - lastTick >= TICK_MS) {
    lastTick = now;
    if (dead) {
      deadFrames++;
      if (deadFrames >= 20) init();
    } else if (celebrate) {
      celebrateFrames++;
      if (celebrateFrames >= 25) {
        celebrate = false;
        collected = [];
        updateLettersDisplay();
        placeAllFoods();
      }
    } else {
      tick();
    }
  }

  drawFoods(now);
  drawSnake(now);
  drawOverlay(now);

  requestAnimationFrame(loop);
}

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function onResize() {
  applySize();
}

const ro = new ResizeObserver(onResize);
ro.observe(document.getElementById('canvas-wrap'));

// ─── START ────────────────────────────────────────────────────────────────────
applySize();
init();
updateLettersDisplay();
requestAnimationFrame(loop);
</script>
</body>
</html>
